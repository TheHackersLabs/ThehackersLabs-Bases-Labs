<style>
:root{
    --bg:#0b0b0b;
    --panel:#111;
    --orange:#ff7a18;
    --text:#eaeaea;
    --border:#2a2a2a;
}
*{box-sizing:border-box;}
body{
    margin:0;
    background:var(--bg);
    color:var(--text);
    font-family: Consolas, monospace;
}
header{
    padding:30px;
    text-align:center;
    border-bottom:1px solid var(--border);
}
header img{
    height:70px;
}
nav{
    padding:15px;
    text-align:center;
}
nav a{
    color:var(--text);
    text-decoration:none;
    margin:0 20px;
}
nav a:hover{
    color:var(--orange);
}
.products{
    padding:50px;
    display:grid;
    grid-template-columns:repeat(auto-fit,minmax(260px,1fr));
    gap:30px;
}
.card{
    background:var(--panel);
    border:1px solid var(--border);
    padding:25px;
    text-align:center;
    transition:.25s;
}
.card:hover{
    border-color:var(--orange);
    transform:translateY(-6px);
}
.card img{
    width:100%;
    margin-bottom:20px;
}
.card h3{
    color:white;
}
.card p{
    color:#bbb;
}
.card button{
    background:none;
    border:1px solid var(--orange);
    color:var(--orange);
    padding:10px;
    width:100%;
    cursor:pointer;
}
.card button:hover{
    background:var(--orange);
    color:black;
}
footer{
    border-top:1px solid var(--border);
    padding:20px;
    text-align:center;
    font-size:.85rem;
    color:#888;
}
</style>
</head>
